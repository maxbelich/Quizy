<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quizy</title>

    <script src="script/template.js"></script>
    <script src="script/script.js"></script>

    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./style/reset.css" />
    <link rel="stylesheet" href="./style/style.css" />
    <link rel="stylesheet" href="./style/responsive.css" />
  </head>

  <body onload="init()">
    <nav class="navbar bg-body-tertiary">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Quizy</span>
      </div>
    </nav>

    <div class="container">
      <div class="card quiz_card">
        <img src="./assets/imgs/quiz_bg.png" class="card-img-top" alt="..." />
        <div class="card-body">
          <h5 class="card-title" id="questionText">Question</h5>

          <div class="card answer_card mb-2" onclick="answer('answer_1')">
            <div class="card-body" id="answer_1">Answer</div>
          </div>

          <div class="card answer_card mb-2" onclick="answer('answer_2')">
            <div class="card-body" id="answer_2">Answer</div>
          </div>

          <div class="card answer_card mb-2" onclick="answer('answer_3')">
            <div class="card-body" id="answer_3">Answer</div>
          </div>

          <div class="card answer_card mb-2" onclick="answer('answer_4')">
            <div class="card-body" id="answer_4">Answer</div>
          </div>

          <div class="question_footer">
            <span><b>1</b> of <b id="all_questions"></b> Questions</span>
            <button class="btn btn-primary">Next Question</button>
          </div>

        </div>
      </div>
    </div>
  </body>
  
</html>
